<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 220" preserveAspectRatio="none" role="img" aria-label="electric header">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1a0033" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#08010f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="hardglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="0.8" fill="#00f0ff" opacity="0.18"/>
    </pattern>

    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="1500" height="220" fill="url(#bg)"/>
  <rect width="1500" height="220" fill="url(#dots)"/>

  <!-- ===== Persistent dim "ghost" bolts (so static previewers see something) ===== -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.22">
    <path d="M120,-5 L100,55 L130,55 L80,140 L120,140 L60,225"  stroke="#00f0ff" stroke-width="1.2"/>
    <path d="M320,-5 L300,40 L335,40 L290,120 L330,120 L260,225" stroke="#ff00aa" stroke-width="1.2"/>
    <path d="M540,-5 L510,70 L550,70 L490,160 L540,160 L470,225" stroke="#c4ff00" stroke-width="1.2"/>
    <path d="M780,-5 L760,50 L795,50 L740,130 L780,130 L720,225" stroke="#00f0ff" stroke-width="1.4"/>
    <path d="M1000,-5 L975,60 L1010,60 L955,140 L1000,140 L935,225" stroke="#ff00aa" stroke-width="1.2"/>
    <path d="M1240,-5 L1215,45 L1250,45 L1190,135 L1235,135 L1170,225" stroke="#c4ff00" stroke-width="1.2"/>
    <path d="M1420,-5 L1395,55 L1430,55 L1375,145 L1420,145 L1360,225" stroke="#00f0ff" stroke-width="1.2"/>
  </g>

  <!-- ===== Lightning bolts (staggered flickers) ===== -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <path d="M120,-5 L100,55 L130,55 L80,140 L120,140 L60,225"
          stroke="#00f0ff" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity"
               values="0;1;0.15;1;0;0;0;0;0;0"
               keyTimes="0;0.05;0.08;0.12;0.18;0.3;0.5;0.7;0.9;1"
               dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M320,-5 L300,40 L335,40 L290,120 L330,120 L260,225"
          stroke="#ff00aa" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;0.3;1;0;0;0;0;0"
               keyTimes="0;0.15;0.2;0.23;0.28;0.35;0.5;0.7;0.9;1"
               dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M540,-5 L510,70 L550,70 L490,160 L540,160 L470,225"
          stroke="#c4ff00" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0;1;0.4;1;0;0;0;0"
               keyTimes="0;0.2;0.3;0.35;0.4;0.45;0.55;0.75;0.9;1"
               dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M780,-5 L760,50 L795,50 L740,130 L780,130 L720,225"
          stroke="#00f0ff" stroke-width="3" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0;0;1;0.2;1;0;0;0"
               keyTimes="0;0.2;0.35;0.45;0.5;0.55;0.6;0.7;0.9;1"
               dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M1000,-5 L975,60 L1010,60 L955,140 L1000,140 L935,225"
          stroke="#ff00aa" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0;0;0;1;0.3;1;0;0"
               keyTimes="0;0.2;0.35;0.5;0.6;0.65;0.7;0.75;0.85;1"
               dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M1240,-5 L1215,45 L1250,45 L1190,135 L1235,135 L1170,225"
          stroke="#c4ff00" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0;0;0;0;1;0.25;1;0"
               keyTimes="0;0.2;0.35;0.5;0.6;0.75;0.8;0.83;0.88;1"
               dur="4s" repeatCount="indefinite"/>
    </path>

    <path d="M1420,-5 L1395,55 L1430,55 L1375,145 L1420,145 L1360,225"
          stroke="#00f0ff" stroke-width="2" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0;0;0;0;0;1;0.3;1"
               keyTimes="0;0.2;0.35;0.5;0.6;0.75;0.85;0.9;0.95;1"
               dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===== Static sparks (flicker dots) ===== -->
  <g filter="url(#glow)">
    <circle cx="90"   cy="150" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0;1;0;0;0;0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="280"  cy="100" r="1.5" fill="#00f0ff"><animate attributeName="opacity" values="0;0;1;0;0;0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="500"  cy="180" r="1.5" fill="#ff00aa"><animate attributeName="opacity" values="0;0;0;1;0;0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="730"  cy="90"  r="1.5" fill="#c4ff00"><animate attributeName="opacity" values="0;0;0;0;1;0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="980"  cy="170" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0;1;0;0;0;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1200" cy="80"  r="1.5" fill="#00f0ff"><animate attributeName="opacity" values="0;0;1;0;0;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1380" cy="190" r="1.5" fill="#ff00aa"><animate attributeName="opacity" values="0;0;0;1;0;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="200"  cy="60"  r="1"   fill="#c4ff00"><animate attributeName="opacity" values="0;0;0;0;1;0" dur="2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="640"  cy="40"  r="1"   fill="#ffffff"><animate attributeName="opacity" values="0;1;0;0;0;0" dur="2s" begin="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="200" r="1"   fill="#00f0ff"><animate attributeName="opacity" values="0;0;0;1;0;0" dur="2s" begin="0.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ===== Slow horizontal scan line (CRT vibe) ===== -->
  <rect x="0" width="1500" height="3" fill="url(#scan)" opacity="0.6">
    <animate attributeName="y" values="-3;220" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== Bottom circuit line + moving pulse ===== -->
  <line x1="0" y1="217" x2="1500" y2="217" stroke="#00f0ff" stroke-width="1" opacity="0.55"/>
  <line x1="0" y1="219" x2="1500" y2="219" stroke="#ff00aa" stroke-width="0.5" opacity="0.4"/>
  <circle r="5" fill="#00f0ff" filter="url(#hardglow)">
    <animateMotion path="M0,218 L1500,218" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#ff00aa" filter="url(#hardglow)">
    <animateMotion path="M1500,218 L0,218" dur="4.6s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== Subtle frame edges ===== -->
  <line x1="0" y1="1" x2="1500" y2="1" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
</svg>
